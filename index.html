<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aureo 1452 · Piso 4 Ambientes · San Fernando</title>
<meta name="description" content="Piso de 4 ambientes con concepto único en el corazón de San Fernando. Dormitorio principal en suite, cochera fija incluida. Aureo Desarrollos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --n:#080809; --g1:#161619; --g2:#1d1d22; --g3:#26262d;
  --o:#c4a25a; --o2:#dfc07e;
  --w:#f2ede4; --wt:rgba(242,237,228,0.65); --wt2:rgba(242,237,228,0.28);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--n);color:var(--w);font-family:var(--sans);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button,a{font-family:var(--sans);cursor:pointer;text-decoration:none;}

/* TOPBAR */
.topbar{background:var(--o);color:var(--n);text-align:center;padding:9px 20px;font-size:10px;letter-spacing:0.28em;font-weight:500;}

/* NAV */
nav{position:fixed;top:36px;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:18px 56px;transition:all 0.4s var(--ease);}
nav.sc{top:0;background:rgba(8,8,9,0.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(196,162,90,0.1);}
.nav-logo{font-family:var(--serif);font-size:18px;letter-spacing:0.18em;color:var(--w);font-weight:400;}
.nav-logo sup{font-size:10px;color:var(--o);vertical-align:super;}
.nav-links{display:flex;gap:36px;}
.nav-links a{font-size:11px;letter-spacing:0.18em;color:var(--wt);font-weight:300;transition:color 0.2s;}
.nav-links a:hover{color:var(--o);}
.nav-cta{border:1px solid rgba(196,162,90,0.55);color:var(--o);font-size:10px;letter-spacing:0.22em;font-weight:500;padding:10px 24px;background:transparent;transition:all 0.25s;}
.nav-cta:hover{background:var(--o);color:var(--n);}

/* HERO */
.hero{
  min-height:100vh;position:relative;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 56px 80px;
  background:linear-gradient(135deg,#080809 0%,#0e0e12 50%,#13120f 100%);
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(196,162,90,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(196,162,90,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  z-index:0;
}
.hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(to top,var(--n),transparent);
  z-index:0;
}
.hero-accent{
  position:absolute;top:0;right:0;
  width:45vw;height:100%;
  background:radial-gradient(ellipse at 80% 40%,rgba(196,162,90,0.06) 0%,transparent 65%);
  z-index:0;
}
.hero-content{position:relative;z-index:1;max-width:680px;}
.hero-eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.hero-line{width:36px;height:1px;background:var(--o);}
.hero-eye{font-size:10px;letter-spacing:0.32em;color:var(--o);font-weight:400;}
h1{font-family:var(--serif);font-size:clamp(42px,5.8vw,76px);font-weight:400;line-height:1.06;margin-bottom:14px;color:var(--w);}
h1 em{font-style:italic;color:var(--o2);}
.hero-sub{font-size:14px;color:var(--wt);line-height:1.8;font-weight:300;max-width:480px;margin-bottom:48px;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-gold{background:var(--o);color:var(--n);font-size:10px;letter-spacing:0.24em;font-weight:500;padding:16px 36px;border:none;transition:opacity 0.2s;}
.btn-gold:hover{opacity:0.88;}
.btn-ghost{background:transparent;border:1px solid rgba(196,162,90,0.5);color:var(--o);font-size:10px;letter-spacing:0.24em;padding:15px 34px;transition:all 0.25s;}
.btn-ghost:hover{background:rgba(196,162,90,0.08);border-color:var(--o);}
.hero-badge{
  position:absolute;top:140px;right:56px;z-index:1;
  border:1px solid rgba(196,162,90,0.2);padding:28px 32px;text-align:center;
  background:rgba(8,8,9,0.6);backdrop-filter:blur(8px);
}
.badge-n{font-family:var(--serif);font-size:42px;color:var(--o);font-weight:400;line-height:1;margin-bottom:4px;}
.badge-l{font-size:9px;letter-spacing:0.22em;color:var(--wt2);font-weight:300;}
.badge-sep{width:32px;height:1px;background:rgba(196,162,90,0.3);margin:12px auto;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);background:var(--g1);border-top:1px solid rgba(196,162,90,0.12);border-bottom:1px solid rgba(196,162,90,0.07);}
.stat{padding:26px 16px;text-align:center;border-right:1px solid rgba(196,162,90,0.07);}
.stat:last-child{border-right:none;}
.stat-n{font-family:var(--serif);font-size:26px;color:var(--o);margin-bottom:5px;font-weight:400;}
.stat-l{font-size:9px;letter-spacing:0.2em;color:var(--wt2);font-weight:300;}

/* SECTIONS */
section{padding:88px 0;}
.container{max-width:1160px;margin:0 auto;padding:0 56px;}
.eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.eyebrow-line{width:28px;height:1px;background:var(--o);}
.eyebrow-txt{font-size:10px;letter-spacing:0.3em;color:var(--o);font-weight:400;}
.sec-h{font-family:var(--serif);font-size:clamp(28px,3.8vw,46px);font-weight:400;color:var(--w);line-height:1.1;margin-bottom:12px;}
.sec-h em{font-style:italic;color:var(--o2);}
.sec-p{font-size:13px;color:var(--wt);line-height:1.85;font-weight:300;max-width:520px;margin-bottom:52px;}
.gold-bar{width:44px;height:1px;background:var(--o);margin-bottom:48px;}

/* FEATURES */
.feats{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:48px;}
.feat{background:var(--g1);padding:38px 30px;position:relative;overflow:hidden;border-bottom:2px solid transparent;transition:border-color 0.35s,background 0.3s;}
.feat:hover{background:var(--g2);border-bottom-color:var(--o);}
.feat-bg{position:absolute;right:20px;bottom:10px;font-family:var(--serif);font-size:80px;color:rgba(196,162,90,0.04);line-height:1;user-select:none;}
.feat-t{font-size:15px;color:var(--w);font-weight:500;margin-bottom:10px;letter-spacing:0.02em;}
.feat-d{font-size:12px;color:var(--wt);line-height:1.78;font-weight:300;}
.feat-icon{font-size:22px;margin-bottom:16px;}

/* FEAT LIST */
.fl{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid rgba(196,162,90,0.08);}
.fl-i{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid rgba(196,162,90,0.06);border-right:1px solid rgba(196,162,90,0.06);transition:background 0.2s;}
.fl-i:hover{background:rgba(196,162,90,0.03);}
.fl-dot{width:5px;height:5px;border-radius:50%;background:var(--o);flex-shrink:0;}
.fl-t{font-size:12px;color:var(--wt);font-weight:300;}

/* CONCEPTO STRIP */
.concepto-strip{
  background:var(--g1);
  border-top:1px solid rgba(196,162,90,0.1);
  border-bottom:1px solid rgba(196,162,90,0.1);
  padding:64px 56px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:48px;
}
.cs-num{font-family:var(--serif);font-size:56px;color:rgba(196,162,90,0.12);line-height:1;margin-bottom:12px;}
.cs-t{font-size:14px;color:var(--o);font-weight:500;margin-bottom:8px;letter-spacing:0.05em;}
.cs-d{font-size:13px;color:var(--wt);line-height:1.78;font-weight:300;}

/* FICHA */
.ficha-g{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.ft{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--g1);border-left:2px solid transparent;transition:border-color 0.25s,background 0.25s;}
.ft:hover{border-left-color:var(--o);background:var(--g2);}
.ft-l{font-size:11px;color:var(--wt2);letter-spacing:0.12em;font-weight:300;}
.ft-v{font-size:13px;color:var(--w);font-weight:500;text-align:right;}
.ft-v.o{color:var(--o);}

/* FRICCIÓN */
.fric{background:var(--g1);border-top:1px solid rgba(196,162,90,0.08);border-bottom:1px solid rgba(196,162,90,0.08);}
.fric-in{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.fric-h{font-family:var(--serif);font-size:clamp(26px,3.2vw,42px);font-weight:400;color:var(--w);line-height:1.1;margin-bottom:16px;}
.fric-h em{font-style:italic;color:var(--o2);}
.fric-sub{font-size:13px;color:var(--wt);line-height:1.8;font-weight:300;}
.fric-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fric-opt{background:var(--g2);border:1px solid rgba(242,237,228,0.07);padding:20px 18px;cursor:pointer;text-align:left;transition:all 0.25s;position:relative;overflow:hidden;}
.fric-opt::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--o);transform:scaleX(0);transform-origin:left;transition:transform 0.3s var(--ease);}
.fric-opt:hover{border-color:rgba(196,162,90,0.3);background:rgba(196,162,90,0.04);}
.fric-opt:hover::after,.fric-opt.sel::after{transform:scaleX(1);}
.fric-opt.sel{border-color:rgba(196,162,90,0.4);background:rgba(196,162,90,0.05);}
.fo-t{font-size:11px;letter-spacing:0.14em;color:var(--w);font-weight:500;margin-bottom:5px;}
.fo-d{font-size:11px;color:var(--wt2);font-weight:300;}

/* PRECIO */
.precio-box{background:var(--g1);border:1px solid rgba(196,162,90,0.12);padding:56px;text-align:center;}
.precio-ey{font-size:10px;letter-spacing:0.28em;color:var(--wt2);margin-bottom:20px;font-weight:300;}
.precio-main{font-family:var(--serif);font-size:clamp(50px,6.5vw,84px);color:var(--o);font-weight:400;line-height:1;margin-bottom:8px;}
.precio-note{font-size:11px;color:var(--wt2);letter-spacing:0.18em;margin-bottom:36px;font-weight:300;}
.precio-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:44px;}
.precio-tag{border:1px solid rgba(196,162,90,0.22);padding:6px 16px;font-size:9px;color:var(--o);letter-spacing:0.18em;font-weight:300;}
.precio-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* CONTACTO */
.ctc{
  position:relative;padding:100px 56px;text-align:center;overflow:hidden;
  background:linear-gradient(135deg,#0a0a0c 0%,#111108 100%);
}
.ctc::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 30% 50%,rgba(196,162,90,0.05) 0%,transparent 55%),
    radial-gradient(circle at 70% 50%,rgba(196,162,90,0.03) 0%,transparent 50%);
}
.ctc-c{position:relative;z-index:1;}
.ctc-h{font-family:var(--serif);font-size:clamp(30px,4.5vw,58px);color:var(--w);font-weight:400;line-height:1.08;margin-bottom:10px;}
.ctc-h em{font-style:
